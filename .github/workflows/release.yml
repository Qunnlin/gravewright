# Automatic tags & releases (see CLAUDE.md → Versioning & changelog):
#  - every version bump that lands on main gets an annotated tag vX.Y.Z
#  - minor and major versions (patch == 0) additionally get a GitHub
#    Release whose notes are that version's CHANGELOG.md section
#  - re-runs are no-ops once the tag exists; a mismatch between
#    package.json and src/core/version.ts fails loudly
name: tag-and-release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read & verify version
        id: v
        run: |
          PKG=$(node -p "require('./package.json').version")
          SRC=$(sed -n "s/.*GAME_VERSION = '\(.*\)';/\1/p" src/core/version.ts)
          if [ "$PKG" != "$SRC" ]; then
            echo "::error::version mismatch: package.json has $PKG, src/core/version.ts has $SRC"
            exit 1
          fi
          echo "version=$PKG" >> "$GITHUB_OUTPUT"
          echo "patch=${PKG##*.}" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$PKG" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag the version
        if: steps.v.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.v.outputs.version }}" -m "GRAVEWRIGHT v${{ steps.v.outputs.version }}"
          git push origin "v${{ steps.v.outputs.version }}"

      - name: Extract release notes from CHANGELOG.md
        if: steps.v.outputs.exists == 'false' && steps.v.outputs.patch == '0'
        run: |
          awk -v ver="${{ steps.v.outputs.version }}" '
            $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "_No CHANGELOG section found for ${{ steps.v.outputs.version }}._" > /tmp/notes.md
          fi

      - name: GitHub release (minor & major only)
        if: steps.v.outputs.exists == 'false' && steps.v.outputs.patch == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEADING=$(awk -v ver="${{ steps.v.outputs.version }}" \
            '$0 ~ ("^## \\[" ver "\\]") { print; exit }' CHANGELOG.md \
            | sed -e 's/^## \[\(.*\)\][^·]*·\?\s*/v\1 · /' -e 's/ · $//')
          gh release create "v${{ steps.v.outputs.version }}" \
            --title "GRAVEWRIGHT ${HEADING:-v${{ steps.v.outputs.version }}}" \
            --notes-file /tmp/notes.md
