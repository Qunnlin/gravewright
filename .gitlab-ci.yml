# GitLab mirror of .github/workflows/release.yml — the repo is also pushed
# to a GitLab remote, where GitHub Actions never run. Same contract:
# every version bump on the default branch produces a vX.Y.Z tag and a
# GitLab Release whose notes are that version's CHANGELOG.md section.
#
# One platform difference: GitLab's CI_JOB_TOKEN cannot push bare tags, but
# the Releases API may CREATE the tag implicitly — so on GitLab every
# version (patches included) gets a lightweight Release entry; the tag
# rides along. No extra token setup required.
stages: [release]

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - VERSION=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -1)
    - SRC=$(sed -n "s/.*GAME_VERSION = '\(.*\)';/\1/p" src/core/version.ts)
    - |
      if [ "$VERSION" != "$SRC" ]; then
        echo "version mismatch: package.json $VERSION vs src/core/version.ts $SRC"
        exit 1
      fi
    - |
      awk -v ver="$VERSION" '
        $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
        flag && /^## \[/ { exit }
        flag { print }' CHANGELOG.md > notes.md
      if [ ! -s notes.md ]; then
        echo "Patch release v$VERSION — see CHANGELOG.md." > notes.md
      fi
    # tolerate re-runs: an existing release/tag for this version is fine
    - release-cli create
        --name "GRAVEWRIGHT v$VERSION"
        --tag-name "v$VERSION"
        --description "$(cat notes.md)"
      || echo "release v$VERSION already exists — nothing to do"
